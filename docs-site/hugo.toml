baseURL = "https://go.mcp-toolbox.dev/"
title = "MCP Toolbox Go API Reference"

relativeURLs = true
canonifyURLs = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  copyright = "Google LLC"
  privacy_policy = "https://policies.google.com/privacy"

[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
