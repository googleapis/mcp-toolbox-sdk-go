baseURL = "https://go.mcp-toolbox.dev/"
title = "MCP Toolbox Go API Reference"
theme = ["docsy"]

relativeURLs = true
canonifyURLs = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

ignoreLogs = ["warning-goldmark-raw-html"]

[params]
copyright = "Google LLC"
privacy_policy = "https://policies.google.com/privacy"

[module]
  proxy = "direct"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
