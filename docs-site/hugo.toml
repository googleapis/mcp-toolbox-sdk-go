baseURL = "https://anmolshukla2002.github.io/mcp-toolbox-sdk-go/"
title = "MCP Toolbox Go API"

[params]
  offlineSearch = true
  copyright = "2026 Google LLC"
  version_menu = "Releases"

[[params.versions]]
    version = "v0.0.1"
    url = "https://anmolshukla2002.github.io/mcp-toolbox-sdk-go/v0.0.1/"

  [[params.versions]]
    version = "main"
    url = "https://anmolshukla2002.github.io/mcp-toolbox-sdk-go/main/"

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  noClasses = false
  style = "tango"

[params.ui]
  navbar_logo = true
  sidebar_menu_foldable = true
  ul_show = 2
  breadcrumb_disable = true
  sidebar_menu_compact = false
  showLightDarkModeMenu = true

[[menu.main]]
  name = "GenAI Toolbox Docsite"
  url = "https://googleapis.github.io/genai-toolbox/getting-started/introduction/"
  weight = 10

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/googleapis/genai-toolbox"
  weight = 20
  pre = "<i class='fab fa-github'></i>"

[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    root = true
  [outputFormats.LLMS-FULL]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    root = true

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMS-FULL", "JSON"]

[module]
  [[module.imports]]
    path = "github.com/google/docsy"