name: "API Reference Deployment"
on:
  push:
    branches: [ 'main' ]
    tags: [ '**' ]
  workflow_dispatch:

concurrency:
  group: api-docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Never run on forks; docs deploy only from the upstream repository.
    if: github.repository == 'googleapis/mcp-toolbox-sdk-go'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25.0'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3
        with:
          hugo-version: '0.152.2'
          extended: true   
          
      - name: Install PostCSS Dependencies
        run: |
          cd docs-site
          npm install postcss postcss-cli autoprefixer

      - name: Resolve build target
        id: resolve
        run: |
          # Route the git ref to the package(s) and version to build.
          # A per-package tag builds that one package; pushes to main (and manual
          # dispatch) build all three as "dev". Any other tag is skipped.
          REF="${GITHUB_REF}"
          case "$REF" in
            refs/tags/core/v*)     echo "packages=core"                >> "$GITHUB_OUTPUT"; echo "version=${REF#refs/tags/core/}"     >> "$GITHUB_OUTPUT" ;;
            refs/tags/tbadk/v*)    echo "packages=tbadk"               >> "$GITHUB_OUTPUT"; echo "version=${REF#refs/tags/tbadk/}"    >> "$GITHUB_OUTPUT" ;;
            refs/tags/tbgenkit/v*) echo "packages=tbgenkit"            >> "$GITHUB_OUTPUT"; echo "version=${REF#refs/tags/tbgenkit/}" >> "$GITHUB_OUTPUT" ;;
            refs/tags/*)           echo "packages="                    >> "$GITHUB_OUTPUT"; echo "version="                          >> "$GITHUB_OUTPUT" ;;
            *)                     echo "packages=core tbadk tbgenkit" >> "$GITHUB_OUTPUT"; echo "version=dev"                        >> "$GITHUB_OUTPUT" ;;
          esac

          # Deploys only run upstream (see job-level guard), so always use the
          # production domain.
          echo "BASE_URL=https://go.mcp-toolbox.dev/" >> "$GITHUB_ENV"

      - name: Build per-package docs
        if: steps.resolve.outputs.packages != ''
        run: |
          chmod +x scripts/generate-api-docs.sh
          for PKG in ${{ steps.resolve.outputs.packages }}; do
            ./scripts/generate-api-docs.sh "$PKG" "${{ steps.resolve.outputs.version }}" "$BASE_URL"
          done

      - name: Build root page
        if: steps.resolve.outputs.packages != '' && startsWith(github.ref, 'refs/tags/')
        run: |
          chmod +x scripts/generate-root.sh
          ./scripts/generate-root.sh "$BASE_URL"

      # Overlay the build onto a clone of the live gh-pages tree in a single
      # commit. This mirrors the old keep_files: true deploy — existing version
      # dirs, CNAME, and .nojekyll are preserved — but additionally prunes
      # superseded offline-search-index files. Each rebuilt directory gets a new
      # content-hashed index, and under a purely additive deploy the previous one
      # would linger forever (the dev dirs and root rebuild repeatedly). Mirrors
      # the manual-overlay approach already used by api-docs-backfill.yml.
      - name: Deploy to gh-pages
        if: steps.resolve.outputs.packages != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PUB="${GITHUB_WORKSPACE}/docs-site/public"
          WORK="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages --single-branch \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$WORK"

          # For every directory this build refreshes, drop the old search index so
          # only the new content-hashed one survives the overlay below.
          while IFS= read -r idx; do
            dir="$(dirname "${idx#"$PUB"/}")"
            rm -f "$WORK/$dir"/offline-search-index.*.json
          done < <(find "$PUB" -name 'offline-search-index.*.json')

          # Additive overlay (matches keep_files: true).
          cp -R "$PUB/." "$WORK/"
          # Preserve settings the peaceiris action used to manage.
          echo "go.mcp-toolbox.dev" > "$WORK/CNAME"
          touch "$WORK/.nojekyll"

          cd "$WORK"
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes; nothing to deploy."
            exit 0
          fi
          git commit -m "docs(api): deploy ${{ steps.resolve.outputs.packages }} @ ${{ steps.resolve.outputs.version }}"
          git push origin gh-pages
